version: '3.8'

services:
  mongodb:
    image: mongo:7.8
    container_name: quickbite_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: quickbite_backend
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/foodiehub
      - PORT=5001
    depends_on:
      - mongodb
    command: npm start

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    container_name: quickbite_frontend
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
